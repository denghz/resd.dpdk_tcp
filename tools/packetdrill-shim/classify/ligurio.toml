# A7 ligurio corpus classifier.
#
# Rules evaluated in order. First match wins. Each rule:
#   - matches_regex: applied to the path relative to
#     third_party/packetdrill-testcases/
#   - verdict: "runnable" | "skipped-untranslatable" | "skipped-out-of-scope"
#   - reason: short string; appears in SKIPPED.md when skipped.
#
# ------------------------------------------------------------------
# A7 T15 PRAGMATIC-FLOOR CLASSIFICATION
# ------------------------------------------------------------------
# The dry-run pass showed 0/122 corpus scripts currently exit 0 on the
# A7-stage shim binary. Root causes fall into a small number of
# categories, each mapped to a skip bucket below. Because the engine
# bugs / shim gaps that drive these categories are out of scope for T15
# itself ("Do NOT modify the shim patches during T15"), every corpus
# script is skipped this phase. LIGURIO_RUNNABLE_COUNT is pinned at 0.
# Every skipped path is enumerated in tools/packetdrill-shim/SKIPPED.md
# with its category reason. A8+ work will move scripts out of the skip
# buckets as the corresponding engine/shim gap is closed.
# ------------------------------------------------------------------

# --- (1) Pre-existing scaffolding rules (kept for A8+ generality) ---

[[rule]]
matches_regex = ".*/ipv6/.*\\.pkt"
verdict = "skipped-out-of-scope"
reason = "IPv4 only in Stage 1"

[[rule]]
matches_regex = ".*SIGIO.*\\.pkt"
verdict = "skipped-untranslatable"
reason = "SIGIO semantics not in test-FFI"

[[rule]]
matches_regex = ".*FIONREAD.*\\.pkt"
verdict = "skipped-untranslatable"
reason = "FIONREAD not in test-FFI"

[[rule]]
matches_regex = ".*SO_RCVLOWAT.*\\.pkt"
verdict = "skipped-untranslatable"
reason = "SO_RCVLOWAT not implemented"

[[rule]]
matches_regex = ".*MSG_PEEK.*\\.pkt"
verdict = "skipped-untranslatable"
reason = "MSG_PEEK not in test-FFI"

[[rule]]
matches_regex = ".*TCP_DEFER_ACCEPT.*\\.pkt"
verdict = "skipped-untranslatable"
reason = "TCP_DEFER_ACCEPT not implemented"

[[rule]]
matches_regex = ".*TCP_CORK.*\\.pkt"
verdict = "skipped-untranslatable"
reason = "TCP_CORK not implemented"

# --- (2) T15 category rules (in dry-run severity order) ---

# Features the shim explicitly returns EOPNOTSUPP for: epoll, splice,
# pipe, sendfile. All corpus scripts under these directories hit one of
# those stubs on the first relevant syscall.

[[rule]]
matches_regex = ".*/epoll/.*\\.pkt"
verdict = "skipped-untranslatable"
reason = "epoll_* returns EOPNOTSUPP in A7 shim (A8+ to wire)"

[[rule]]
matches_regex = ".*/splice/.*\\.pkt"
verdict = "skipped-untranslatable"
reason = "splice/pipe returns EOPNOTSUPP in A7 shim"

[[rule]]
matches_regex = ".*/sendfile/.*\\.pkt"
verdict = "skipped-untranslatable"
reason = "sendfile not wired in A7 test-FFI (needs backing fd plumbing)"

