# --- (3) Server-side lifecycle groups ---
#
# A8 T15 S2 wired packetdrill's per-script live_local_ip / live_remote_ip
# through the shim's inject/drain IP-rewrite and routed the engine's
# conn-peer FFI back through shim_accept, so the following subset of
# listen/blocking/close/reset/shutdown scripts now run end-to-end. The
# runnable allowlist is explicit because the remaining directory-mates
# hit distinct engine-side gaps (FreeBSD-style silent drop, ISN=0
# expectation, shutdown() wiring, scripts/defaults.sh dependency) that
# stay on the A8+ backlog.

[[rule]]
matches_regex = ".*/listen/listen-incoming-syn-ack\\.pkt"
verdict = "runnable"
reason = "A8 T15 S2: listener rejects SYN-ACK with RST, then accepts retry SYN"

[[rule]]
matches_regex = ".*/listen/listen-incoming-ack\\.pkt"
verdict = "runnable"
reason = "A8 T15 S2: listener rejects bare ACK with RST, then accepts retry SYN"

[[rule]]
matches_regex = ".*/listen/listen-incoming-rst\\.pkt"
verdict = "runnable"
reason = "A8 T15 S2: listener drops unsolicited RST then accepts retry SYN"

[[rule]]
matches_regex = ".*/listen/listen-incoming-syn-rst\\.pkt"
verdict = "runnable"
reason = "A8 T15 S2: listener drops SYN|RST combo then accepts retry SYN"

[[rule]]
matches_regex = ".*/blocking/blocking-simple-server\\.pkt"
verdict = "runnable"
reason = "A8 T15 S2: minimal blocking listen->accept->close round-trip"

[[rule]]
matches_regex = ".*/close/simultaneous-close\\.pkt"
verdict = "runnable"
reason = "A8 T15 S2: simultaneous-close FIN exchange after accept"

[[rule]]
matches_regex = ".*/listen/.*\\.pkt"
verdict = "skipped-untranslatable"
reason = "server-side edge behavior (FreeBSD silent-drop on no-flags) needs engine parity (A8+)"

[[rule]]
matches_regex = ".*/blocking/.*\\.pkt"
verdict = "skipped-untranslatable"
reason = "requires scripts/defaults.sh init and blocking-accept timing deltas (A8+)"

[[rule]]
matches_regex = ".*/close/.*\\.pkt"
verdict = "skipped-untranslatable"
reason = "close() tests all require server-side accept path (A8+)"

[[rule]]
matches_regex = ".*/shutdown/.*\\.pkt"
verdict = "skipped-untranslatable"
reason = "half-close semantics not implemented; spec §6.4 AD-A8.5-shutdown-no-half-close (SHUT_RD/SHUT_WR return EOPNOTSUPP; SHUT_RDWR scripts probe post-shutdown read=0/write=EPIPE which is half-close behavior)"

[[rule]]
matches_regex = ".*/reset/.*\\.pkt"
verdict = "skipped-untranslatable"
reason = "RST tests depend on server-side accept path or wire-option parity"

# --- (4) MSS / TCP_MAXSEG socket-option + client-mode plumbing ---
#
# A8.5 Task 5 aligned TX TCP option emission to Linux canonical order
# (`<MSS, NOP+WScale, SACKP, TS>`). After that landed, the remaining
# /mss and /connect scripts no longer fail on option-order — each hits
# a *different* deeper blocker:
#   - shim client-mode `connect()` not driven: SYN never emitted
#   - engine SYN-ACK emits TS/SACKP unconditionally (needs mirror of
#     peer's SYN options), and WScale is buffer-derived, not mirrored
#   - scripts/defaults.sh / ../common/defaults.sh host-env dependency
#   - TCP_MAXSEG setsockopt not plumbed through to the engine
#   - fcntl(O_NONBLOCK) flag-shape drift (pre-connect fcntl plumbing)
#   - outbound TS-clock sync gap preventing TS ecr matching
# SKIPPED.md carries the per-script breakdown.

[[rule]]
matches_regex = ".*/mss/.*\\.pkt"
verdict = "skipped-untranslatable"
reason = "MSS/TCP_MAXSEG + client-mode / host-env plumbing gap (post-reorder; see SKIPPED.md)"

[[rule]]
matches_regex = ".*/connect/.*\\.pkt"
verdict = "skipped-untranslatable"
reason = "fcntl(O_NONBLOCK) flag-shape drift (post-reorder; see SKIPPED.md)"

# --- Default fall-through ---
# No script should hit this in the A7 corpus; anything new gets skipped
# under "awaiting further triage" so the gate fails loudly on a path
# that doesn't match any earlier rule.

[[rule]]
matches_regex = ".*\\.pkt"
verdict = "skipped-untranslatable"
reason = "awaiting further triage (new corpus entry; classify in A8+)"
