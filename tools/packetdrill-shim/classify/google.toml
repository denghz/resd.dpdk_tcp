# A8 T16 Google upstream packetdrill tests classifier.
#
# Rules evaluated in order. First match wins. Each rule:
#   - matches_regex: applied to the path relative to
#     third_party/packetdrill/
#   - verdict: "runnable" | "skipped-untranslatable" | "skipped-out-of-scope"
#   - reason: short string; appears in SKIPPED.md when skipped.
#
# ------------------------------------------------------------------
# A8 T16 / A8.5 T6 CLASSIFICATION NOTES
# ------------------------------------------------------------------
# Google's upstream packetdrill tests under
# third_party/packetdrill/gtests/ (167 .pkt total).
#
# Initial A8 T16 state: every script failed at shell-init because
# 163/167 source `../common/defaults.sh` / `set_sysctls.py`, and the
# upstream versions of those helpers call `sysctl -q` / write to
# /proc/sys/net/... (root-only, not available in CI).
#
# A8.5 T6 progress:
#   - Patch 0007 overlays no-op stubs on top of the two existing
#     common/defaults.sh + common/set_sysctls.py files (one is a
#     symlink, so two real stub files cover both TCP and non-TCP).
#   - The invoker now chdirs into the script's directory before
#     spawning the shim so relative paths in backtick init blocks
#     resolve correctly.
#
# Empirical state on the A8.5 T6 shim binary:
#   0/167 exit 0 end-to-end (pinned floor held)
#   167/167 skipped with the bucket reasons below.
#   The dominant post-init blockers are:
#     - 93 fail on SYN-ACK TCP options shape
#       (ipv4_total_length mismatch; engine emits TS+SACKP
#       unconditionally, scripts expect options mirrored to client).
#     - ~25 fail on fcntl(O_NONBLOCK) flag-shape drift
#       (expected 2 vs actual 2050).
#     - The rest fail on deeper engine gaps already documented in
#       SKIPPED.md (fastopen, sack, cubic, tcp_info, etc.).
#
# A8+ work: close the TCP-option mirroring gap + fcntl drift to
# unlock the ~118 scripts gated on those, then triage the remaining
# engine gaps. Patch 0007 is a prerequisite for any of that work.
# ------------------------------------------------------------------

# --- (1) Pre-existing scaffolding rules (mirror ligurio) ---

[[rule]]
matches_regex = ".*/ipv6/.*\\.pkt"
verdict = "skipped-out-of-scope"
reason = "IPv4 only in Stage 1"

[[rule]]
matches_regex = ".*SIGIO.*\\.pkt"
verdict = "skipped-untranslatable"
reason = "SIGIO semantics not in test-FFI"

[[rule]]
matches_regex = ".*FIONREAD.*\\.pkt"
verdict = "skipped-untranslatable"
reason = "FIONREAD not in test-FFI"

[[rule]]
matches_regex = ".*SO_RCVLOWAT.*\\.pkt"
verdict = "skipped-untranslatable"
reason = "SO_RCVLOWAT not implemented"

[[rule]]
matches_regex = ".*MSG_PEEK.*\\.pkt"
verdict = "skipped-untranslatable"
reason = "MSG_PEEK not in test-FFI"

[[rule]]
matches_regex = ".*TCP_DEFER_ACCEPT.*\\.pkt"
verdict = "skipped-untranslatable"
reason = "TCP_DEFER_ACCEPT not implemented"

[[rule]]
matches_regex = ".*TCP_CORK.*\\.pkt"
verdict = "skipped-untranslatable"
reason = "TCP_CORK not implemented"

# --- (2) Packetdrill-meta self-tests (engine / binary sanity) ---
# These packetdrill/tests/ scripts exercise packetdrill itself
# (socket_err shapes, packet timeout), not TCP semantics. They fail on
# the A8 shim because the engine returns cleanly where the scripts
# expect errno shapes. packet-timeout.pkt previously depended on
# defaults.sh; A8.5 T6 stubs that dependency, but the meta-test is
# still blocked on engine errno-shape gaps.

[[rule]]
matches_regex = "gtests/net/packetdrill/tests/.*/socket_err\\.pkt"
verdict = "skipped-untranslatable"
reason = "socket() errno-shape test: engine always returns success where script expects EAFNOSUPPORT (A8+)"

[[rule]]
matches_regex = "gtests/net/packetdrill/tests/.*/socket_wrong_err\\.pkt"
verdict = "skipped-untranslatable"
reason = "socket() errno-shape test: engine returns OK where script expects -EADDRINUSE (A8+)"

[[rule]]
matches_regex = "gtests/net/packetdrill/tests/packet-timeout\\.pkt"
verdict = "skipped-untranslatable"
reason = "packet-timeout meta test: engine tolerance/timing gap vs scripted budget (post-T6 stubs)"

[[rule]]
matches_regex = "gtests/net/packetdrill/tests/.*/fast_retransmit/.*\\.pkt"
verdict = "skipped-untranslatable"
reason = "Fast-retransmit dupACK heuristic not in engine"

